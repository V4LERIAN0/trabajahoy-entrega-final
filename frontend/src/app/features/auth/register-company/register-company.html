<section class="auth-page">
  <div class="auth-card company-card">
    <div class="auth-brand text-end mb-4">
      <img src="/logoPortal.png" alt="TrabajaHoy">
    </div>

    <div class="text-center mb-4">
      <span class="th-badge-blue">Empresa</span>
      <h1 class="mt-3">Crear cuenta empresarial</h1>
      <p>Registra tu empresa para publicar ofertas y gestionar postulantes.</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      <h5 class="form-section-title">Datos del encargado</h5>

      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Nombre *</label>
          <input class="form-control th-form-control" name="firstName" [(ngModel)]="form.firstName">
        </div>

        <div class="col-md-6">
          <label class="form-label">Apellido *</label>
          <input class="form-control th-form-control" name="lastName" [(ngModel)]="form.lastName">
        </div>

        <div class="col-md-6">
          <label class="form-label">Correo electrónico *</label>
          <input type="email" class="form-control th-form-control" name="email" [(ngModel)]="form.email">
        </div>

        <div class="col-md-6">
          <label class="form-label">Teléfono</label>
          <input class="form-control th-form-control" name="phone" [(ngModel)]="form.phone">
        </div>

        <div class="col-md-6">
          <label class="form-label">Contraseña *</label>
          <input type="password" class="form-control th-form-control" name="password" [(ngModel)]="form.password">
        </div>

        <div class="col-md-6">
          <label class="form-label">Confirmar contraseña *</label>
          <input type="password" class="form-control th-form-control" name="confirmPassword" [(ngModel)]="form.confirmPassword">
        </div>
      </div>

      <h5 class="form-section-title">Datos de la empresa</h5>

      <div class="row g-3">
        <div class="col-md-8">
          <label class="form-label">Nombre de la empresa *</label>
          <input class="form-control th-form-control" name="companyName" [(ngModel)]="form.companyName">
        </div>

        <div class="col-md-4">
          <label class="form-label">Tamaño</label>
          <select class="form-select th-form-control" name="companySize" [(ngModel)]="form.companySize">
            <option value="">Seleccionar</option>
            <option value="1-10">1-10</option>
            <option value="11-50">11-50</option>
            <option value="51-200">51-200</option>
            <option value="201-500">201-500</option>
            <option value="500+">500+</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Industria</label>
          <input class="form-control th-form-control" name="industry" [(ngModel)]="form.industry" placeholder="Tecnología, ventas, educación...">
        </div>

        <div class="col-md-6">
          <label class="form-label">Sitio web</label>
          <input class="form-control th-form-control" name="website" [(ngModel)]="form.website" placeholder="https://empresa.com">
        </div>

        <div class="col-12">
          <label class="form-label">Descripción</label>
          <textarea
            rows="4"
            class="form-control th-form-control"
            name="companyDescription"
            [(ngModel)]="form.companyDescription"
            placeholder="Describe brevemente la empresa"
          ></textarea>
        </div>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2 mt-3">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="alert alert-success py-2 mt-3">
        {{ successMessage }}
      </div>

      <button class="btn auth-submit w-100 mt-4" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Crear empresa</span>
        <span *ngIf="loading">Registrando empresa...</span>
      </button>
    </form>

    <div class="auth-links mt-4">
      <p>
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </p>
    </div>
  </div>
</section>
